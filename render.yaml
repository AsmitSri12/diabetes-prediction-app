# Render Blueprint Configuration (https://render.com/docs/blueprint-spec)
# This file automates the deployment of the FastAPI backend.

services:
  - type: web
    name: fl-diabetes-api
    env: python
    # We use the root directory for the backend API
    rootDir: .
    # Install dependencies using the production requirements file (uses PyTorch CPU to save RAM)
    buildCommand: pip install -r requirements-prod.txt
    # Start the FastAPI Uvicorn server
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
